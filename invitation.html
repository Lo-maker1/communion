<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votre Invitation Personnelle</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

    <div class="stars-container" id="starsBg"></div>

    <div class="card-container main-card" style="position: relative; overflow: hidden;">
        
        <!-- DECORATION DE FLEURS CLAIRES DANS LES COINS (Comme sur le modèle) -->
        <img src="fleurs.jpg" alt="Fleurs" style="position: absolute; top: -10px; left: -10px; width: 90px; height: auto; z-index: 5;">
        <img src="fleurs.jpg" alt="Fleurs" style="position: absolute; top: -10px; right: -10px; width: 90px; height: auto; transform: scaleX(-1); z-index: 5;">

        <div class="sacred-image-container">
            <img src="jesus.jpg" alt="Seigneur Jésus-Christ" class="sacred-img animated-jesus">
            <div class="gold-halo dynamic-halo"></div>
        </div>

        <!-- TITRE AVEC LES VRAIS ANGES DE L'IMAGE_A3AAE1.PNG EN EFFET MIROIR -->
        <h1 class="angel-title" style="display: flex; justify-content: center; align-items: center; gap: 15px; margin: 20px 0;">
            <img src="anges.png" alt="Ange" style="width: 60px; height: auto; filter: drop-shadow(0 0 8px #fde047); animation: floatStars 3s infinite ease-in-out;">
            Sainte Communion
            <img src="anges.png" alt="Ange" style="width: 60px; height: auto; transform: scaleX(-1); filter: drop-shadow(0 0 8px #fde047); animation: floatStars 3s infinite ease-in-out; animation-delay: 1.5s;">
        </h1>
        
        <h2 class="welcome-guest">Invitation d'Honneur pour : <br><span id="nomInvite" class="guest-highlight"></span> ✨</h2>
        
        <!-- BOITE AVEC LE VERITABLE CALICE DORE ET ASSORTIMENT (Pain, vin et raisin) -->
        <div class="communion-symbol-box" style="display: flex; flex-direction: column; justify-content: center; align-items: center; background: #fffdf5; border: 2px double #fef08a; padding: 15px; border-radius: 20px; margin: 20px auto; max-width: 280px;">
            <img src="calice.jpg" alt="Calice Sacré" style="width: 130px; height: auto; filter: drop-shadow(0 4px 10px rgba(234, 179, 8, 0.4)); margin-bottom: 8px;">
            <div class="sparkles-overlay" style="color: #b45309; font-weight: 700; font-size: 14px;">✨ Célébration Unique ✨</div>
        </div>

        <p class="details">Steven et Hillary HOUNTONDJI ont l'honneur de vous inviter à une somptueuse réception dans le cadre de leur première communion.</p>

        <div class="countdown-container">
            <h3>L'événement commence dans :</h3>
            <div id="countdown">Chargement...</div>
        </div>

        <div class="map-section">
            <h3>Lieu de la réception & Itinéraire :</h3>
            <div id="map" style="height: 250px; border-radius: 15px; border: 2px solid #fef08a;"></div>
        </div>

        <div class="corner-stars bottom-left">✨✨</div>
        <div class="corner-stars bottom-right">✨✨</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Sécurité anti-fraude : Si la personne force l'accès sans être passée par l'index
        const nom = localStorage.getItem('guest_name');
        if (!nom) {
            localStorage.setItem('invitation_bloquee', 'true');
            window.location.href = "index.html";
        } else {
            document.getElementById('nomInvite').innerText = nom;
        }

        // --- GÉNÉRATEUR D'ÉTOILES SCINTILLANTES DANS LE DÉCOR ---
        function allumerLesEtoiles() {
            const conteneur = document.getElementById('starsBg');
            for (let i = 0; i < 45; i++) {
                const etoile = document.createElement('div');
                etoile.className = 'star-twinkle';
                etoile.style.top = Math.random() * 100 + 'vh';
                etoile.style.left = Math.random() * 100 + 'vw';
                etoile.style.animationDelay = Math.random() * 3 + 's';
                etoile.style.transform = `scale(${Math.random() * 1.5})`;
                conteneur.appendChild(etoile);
            }
        }
        allumerLesEtoiles();

        // --- COMPTE À REBOURS ---
        const dateEvenement = new Date("May 17, 2027 10:00:00").getTime();

        setInterval(function() {
            const maintenant = new Date().getTime();
            const distance = dateEvenement - maintenant;

            const jours = Math.floor(distance / (1000 * 60 * 60 * 24));
            const heures = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            
            if (distance < 0) {
                document.getElementById("countdown").innerHTML = "C'est le grand jour ! 🎉";
            } else {
                document.getElementById("countdown").innerHTML = `<span>${jours}j</span> : <span>${heures}h</span> : <span>${minutes}m</span>`;
            }
        }, 1000);

        // --- LA CARTE ROUTIÈRE (Leaflet) ---
        var map = L.map('map').setView([6.3654, 2.4183], 15); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker([6.3654, 2.4183]).addTo(map)
            .bindPopup('<b>Lieu de la Communion !</b><br>Soyez les bienvenus.')
            .openPopup();
    </script>
</body>
</html>
